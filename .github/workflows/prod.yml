name: Prod CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Server with Docker Compose
        run: docker compose up -d server

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Integration Tests
        env:
          TARGET_URL: http://localhost:3030
        working-directory: ./tests
        run: npm run test:health

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/backend:prod

  deploy-backend:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Render Production
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
            echo "Deployment to Render Prod triggered."
          else
            echo "RENDER_DEPLOY_HOOK_PROD secret not configured. Skipping deployment."
          fi

  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
