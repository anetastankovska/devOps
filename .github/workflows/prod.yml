name: Prod CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Server with Docker Compose
        run: docker compose up -d server

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Integration Tests
        env:
          TARGET_URL: http://localhost:3030
        working-directory: ./tests
        run: npm run test:health

  approve-deployment:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Await Approval
        run: echo "Deployment approved and starting..."

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/backend:prod

  deploy-backend:
    needs: approve-deployment
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Render Production
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"
            echo "Deployment to Render Prod triggered."
          else
            echo "RENDER_DEPLOY_HOOK_PROD secret not configured. Skipping deployment."
          fi

  deploy-frontend:
    needs: approve-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Prod Build
        run: |
          mkdir -p build
          cp -r client/* build/
          # Replace placeholder with Prod Backend URL in build/index.js
          sed -i 's|__BACKEND_URL__|'${{ secrets.RENDER_BACKEND_URL_PROD }}'|g' build/index.js

      - name: Deploy to GitHub Pages (Prod)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          keep_files: true
